name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build:
    name: Build Windows Executable
    needs: test
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: python build_exe.py

      - name: Verify executable exists
        run: |
          if (Test-Path "dist/LabelMaker.exe") {
            $size = (Get-Item "dist/LabelMaker.exe").Length / 1MB
            Write-Host "Build successful! LabelMaker.exe size: $([math]::Round($size, 2)) MB"
          } else {
            Write-Error "Build failed: LabelMaker.exe not found"
            exit 1
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabelMaker-windows
          path: dist/LabelMaker.exe
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: LabelMaker-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: LabelMaker.exe
          generate_release_notes: true
